name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ────────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. Build ───────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 5. Deploy via FTP (only on push to main) ─────────
      - name: Deploy to server via FTP
        # Only deploy when pushing to main (not on PRs)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Upload the built app
          local-dir: ./dist/

          # Root of the webserver — NEVER deletes files not in dist/
          # (so the /omk folder stays untouched)
          server-dir: /

          # Protect the Omeka installation and other non-app files
          exclude: |
            **/.git*
            **/node_modules/**
            **/omk/**
            **/omk
            **/.htaccess
            **/php.ini

      # ── 6. Playwright browsers ─────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── 7. E2E tests ───────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          # Tests run against the already-deployed production site
          BASE_URL: https://tests.arcanes.ca
          CI: true

      # ── 8. Upload test report on failure ───────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
